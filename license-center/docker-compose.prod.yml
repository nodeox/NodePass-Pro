version: '3.8'

# 生产环境配置 - 使用预构建镜像

services:
  postgres:
    image: postgres:16-alpine
    container_name: license-center-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nodepass_license}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - license-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nodepass_license}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  license-center:
    # 使用预构建镜像
    image: ${REGISTRY:-}${REGISTRY:+/}${IMAGE_NAME:-nodepass/license-center}:${BUILD_VERSION:-0.3.0}
    container_name: license-center
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8090}:8090"
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      - app_logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=${GIN_MODE:-release}
    networks:
      - license-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  license-network:
    driver: bridge

volumes:
  pg_data:
    driver: local
  app_logs:
    driver: local
