server:
  port: "8090"
  mode: "release"

database:
  type: "postgres" # sqlite / mysql / postgres
  host: "postgres"
  port: 5432
  user: "postgres"
  password: "postgres"
  db_name: "nodepass_license"
  dsn: "host=postgres port=5432 user=postgres password=postgres dbname=nodepass_license sslmode=disable TimeZone=UTC"

redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  prefix: "license:"

jwt:
  # 必填，建议使用 32 位以上随机字符串
  secret: ""
  expire_hours: 24

admin:
  username: "admin"
  email: "admin@license.local"
  # 首次初始化管理员时必填，建议使用 12 位以上强密码
  password: ""

security:
  rate_limit:
    enabled: true
    requests_per_second: 10
    burst: 20
  signature:
    enabled: false
    # 启用后必填，建议使用 32 位以上随机字符串
    secret: ""
    time_window: 300
  ip_whitelist:
    enabled: false
    allowed_ips: []
    allowed_cidrs: []

monitoring:
  alert:
    enabled: true
    check_interval: 3600 # 秒
    expiring_days: 30
  cleanup:
    enabled: true
    verify_log_days: 90
    webhook_log_days: 30
    alert_days: 90
