services:
  postgres:
    image: postgres:16-alpine
    container_name: nodepass-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nodepass_panel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nodepass_panel"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nodepass-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${BACKEND_VERSION:-dev}
    container_name: nodepass-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ${BACKEND_CONFIG_FILE:-./backend/configs/config.docker.yaml}:/app/configs/config.yaml:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${FRONTEND_VERSION:-dev}
    container_name: nodepass-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_BIND:-127.0.0.1:5173}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
