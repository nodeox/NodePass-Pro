services:
  postgres:
    image: postgres:16-alpine
    container_name: nodepass-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nodepass_panel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nodepass_panel"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nodepass-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: "${BACKEND_IMAGE:-ghcr.io/nodeox/nodepass-backend:0.1.0}"
    container_name: nodepass-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # JWT 密钥（必须设置）
      # 生成方法：openssl rand -base64 48
      # 警告：不要使用默认值，必须在 .env 文件或环境变量中设置
      NODEPASS_JWT_SECRET: "${JWT_SECRET:?JWT_SECRET environment variable is required. Generate with: openssl rand -base64 48}"
      NODEPASS_JWT_EXPIRE_TIME: "${JWT_EXPIRE_TIME:-168}"
      # 授权配置
      NODEPASS_LICENSE_ENABLED: "${BACKEND_LICENSE_ENABLED:-false}"
      NODEPASS_LICENSE_LICENSE_KEY: "${LICENSE_KEY:-}"
      NODEPASS_LICENSE_MACHINE_ID: "${LICENSE_MACHINE_ID:-}"
      NODEPASS_LICENSE_VERIFY_URL: "${BACKEND_LICENSE_VERIFY_URL:-}"
      NODEPASS_LICENSE_PRODUCT: "${BACKEND_LICENSE_PRODUCT:-backend}"
      NODEPASS_LICENSE_CHANNEL: "${BACKEND_LICENSE_CHANNEL:-stable}"
      NODEPASS_LICENSE_CLIENT_VERSION: "${BACKEND_LICENSE_CLIENT_VERSION:-}"
      NODEPASS_LICENSE_REQUIRE_DOMAIN: "${BACKEND_LICENSE_REQUIRE_DOMAIN:-false}"
      NODEPASS_LICENSE_DOMAIN: "${BACKEND_LICENSE_DOMAIN:-}"
      NODEPASS_LICENSE_SITE_URL: "${BACKEND_LICENSE_SITE_URL:-}"
      NODEPASS_LICENSE_VERIFY_INTERVAL: "${BACKEND_LICENSE_VERIFY_INTERVAL:-300}"
      NODEPASS_LICENSE_FAIL_OPEN: "${BACKEND_LICENSE_FAIL_OPEN:-false}"
      NODEPASS_LICENSE_OFFLINE_GRACE_SECONDS: "${BACKEND_LICENSE_OFFLINE_GRACE_SECONDS:-600}"
      NODEPASS_RUNTIME_VERSION: "${BACKEND_VERSION:-0.1.0}"
    volumes:
      - ${BACKEND_CONFIG_FILE:-./backend/configs/config.docker.yaml}:/app/configs/config.yaml:ro
    restart: unless-stopped

  frontend:
    image: "${FRONTEND_IMAGE:-ghcr.io/nodeox/nodepass-frontend:0.1.0}"
    container_name: nodepass-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_BIND:-127.0.0.1:5173}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
