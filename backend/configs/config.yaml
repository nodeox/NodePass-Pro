server:
  port: "8080"
  mode: "debug" # debug / release
  # WebSocket 允许的来源列表（用于 CORS 验证）
  # 支持以下格式：
  # - 完整 URL: "https://panel.example.com"
  # - 主机名: "panel.example.com"
  # - 通配符: "*.example.com" (匹配所有子域名)
  # 开发模式下自动允许 localhost 和 127.0.0.1
  # 生产模式下必须明确配置允许的来源
  allowed_origins:
    - "localhost"
    - "127.0.0.1"
    # 生产环境示例（取消注释并修改）：
    # - "https://panel.example.com"
    # - "*.example.com"

database:
  type: "postgres" # sqlite / mysql / postgres
  host: "127.0.0.1"
  port: 5432
  user: "postgres"
  password: "postgres"
  db_name: "nodepass_panel"
  dsn: "host=127.0.0.1 port=5432 user=postgres password=postgres dbname=nodepass_panel sslmode=disable TimeZone=Asia/Shanghai" # PostgreSQL 示例；可留空并使用上面的 host/port/user/password/db_name 组合

redis:
  enabled: true
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  key_prefix: "nodepass:panel"
  default_ttl: 300 # 秒

jwt:
  secret: "change-this-secret-in-production"
  expire_time: 168 # 小时

telegram:
  bot_token: ""
  bot_username: ""
  webhook_url: ""

license:
  enabled: false
  verify_url: "https://license.nodepass.pro/api/v1/license/verify"
  license_key: ""
  machine_id: ""
  verify_interval: 300
  fail_open: false
  offline_grace_seconds: 600
