server:
  port: "8080"
  mode: "release"
  allowed_origins:
    - "localhost"
    - "127.0.0.1"
  # Docker 环境通常在反向代理后，可以信任 X-Forwarded-* 头
  # 如果直接暴露后端，请设置为 false
  trust_forwarded_headers: true
  # 生产环境建议启用严格 CSRF 模式
  strict_csrf: true

database:
  type: "postgres"
  host: "postgres"
  port: 5432
  user: "postgres"
  password: "postgres"
  db_name: "nodepass_panel"
  dsn: "host=postgres port=5432 user=postgres password=postgres dbname=nodepass_panel sslmode=disable TimeZone=Asia/Shanghai"

redis:
  enabled: true
  addr: "redis:6379"
  password: ""
  db: 0
  key_prefix: "nodepass:panel"
  default_ttl: 300

jwt:
  # JWT 密钥：必须通过环境变量 NODEPASS_JWT_SECRET 设置
  # 不要在配置文件中硬编码密钥！
  # 生成方法：openssl rand -base64 48
  # Docker Compose 中通过环境变量传入
  secret: ""
  expire_time: 168

telegram:
  bot_token: ""
  bot_username: ""
  webhook_url: ""

license:
  enabled: false
  license_key: ""
  machine_id: ""
  domain: ""
  site_url: ""
  verify_interval: 300
  fail_open: false
  offline_grace_seconds: 600
