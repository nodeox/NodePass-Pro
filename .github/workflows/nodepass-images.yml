name: Publish NodePass Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "backend/**"
      - "frontend/**"
      - "VERSION"
      - ".github/workflows/nodepass-images.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/nodepass-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/nodepass-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build version
        id: build_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_VALUE="${GITHUB_REF_NAME#v}"
          elif [[ -f VERSION ]]; then
            VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          else
            VERSION_VALUE=""
          fi
          if [[ -z "${VERSION_VALUE}" ]]; then
            VERSION_VALUE="main-${GITHUB_SHA::7}"
          fi
          echo "value=${VERSION_VALUE}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.build_version.outputs.value }}
            type=raw,value=v${{ steps.build_version.outputs.value }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.build_version.outputs.value }}
